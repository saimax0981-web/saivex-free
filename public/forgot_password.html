<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;min-height:100vh;font-family:Arial;background:radial-gradient(circle at top,#3b2204,#080300 55%),#080300;color:#fff7d6;display:flex;justify-content:center;align-items:center;padding:18px}
.card{width:100%;max-width:420px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.25);border-radius:24px;padding:28px}
h1{text-align:center;color:#ffdf8a}input{width:100%;padding:16px;border-radius:22px;border:1px solid rgba(255,196,77,.35);background:rgba(0,0,0,.25);color:white;margin-bottom:12px;box-sizing:border-box}
button{width:100%;padding:15px;border:none;border-radius:22px;background:#ffbf3c;font-weight:bold}a{display:block;text-align:center;color:#ffdf8a;margin-top:18px;text-decoration:none}
</style>
</head>
<body><div class="card"><h1>Reset Password</h1><form method="POST"><input name="email" type="email" placeholder="Email address" required><button>Generate Reset Link</button></form><a href="login.html">Back to Login</a></div></body>
</html>
