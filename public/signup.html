<!DOCTYPE html>
<html>
<head>
<title>SAIVEX Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#3b2204,#080300 55%),#080300;color:#fff7d6;display:flex;justify-content:center;align-items:center;padding:18px}
.card{width:100%;max-width:430px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.25);border-radius:26px;padding:28px;box-shadow:0 0 35px rgba(255,191,60,.18)}
.logo{width:85px;height:85px;border-radius:50%;display:block;margin:0 auto 12px;object-fit:cover;box-shadow:0 0 25px #ffbf3c}
h1{text-align:center;color:#ffdf8a;letter-spacing:4px;margin-bottom:22px}
input{width:100%;padding:16px;border-radius:24px;border:1px solid rgba(255,196,77,.35);background:rgba(0,0,0,.25);color:white;outline:none;margin-bottom:12px;font-size:15px}
button{width:100%;padding:16px;border:none;border-radius:24px;background:linear-gradient(90deg,#ffbf3c,#b66a00);color:#1b0c00;font-weight:900;font-size:16px;cursor:pointer}
a{display:block;text-align:center;color:#ffdf8a;margin-top:18px;text-decoration:none}
p{color:#d6c08a;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="card">
<img src="/static/logo.png" class="logo">
<h1>JOIN SAIVEX</h1>
<p>Password must be at least 6 characters.</p>
<form method="POST">
<input name="name" placeholder="Your name" required>
<input name="email" type="email" placeholder="Email address" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Create Account</button>
</form>
<a href="login.html">Already have account?</a>
</div>
</body>
</html>
